{{- $date := printf "Le %d/%d/%d" .Date.Day .Date.Month .Date.Year }}
{{- $allAuthors := .Site.Data.authors }}
{{- $authorKey := .Params.author }}
{{- $authorData := index $allAuthors $authorKey }}

<div class="blog-item__byline">
  {{ if $date }}
    <p class="blog-item__date">
      {{ $date }}
    </p>
  {{ end }}
</div>
