    <h3 id="contenu-en-cours-de-rédaction-">Contenu en cours de rédaction !</h3>
<!--### Avez-vous déjà vu un mouton dans la ville ?
Probablement pas, pourtant, la présence de ce sympathique animal apporterait beaucoup aux Strasbouregoi·e·s, tant sur un plan environnemental que social. C’est avec cette idée là que s'est créée l’association Stras’bêrgerie le 28 janvier 2025. 
L’objectif principal de l’association est de rapprocher la nature et l’agriculture de la ville et de ses habitant·e·s, petit·e·s et grand·e·s, pour préserver la biodiversité des milieux ouverts, pour sensibiliser aux enjeux de développement durable et pour créer plus de lien social.
L’association Stras’bêrgerie, s’installera cette année dans le quartier de Koenigshoffen, au coeur du Parc naturel urbain (PNU), sur le terrain du Couvent des Capucins appartenant à la Fédération de Charité - Caritas Alsace.
La future bergerie accueillera les moutons et pourra recevoir le grand public pour des activités en lien avec les animaux. L'association Stras'bêrgerie souhaite à terme mettre en oeuvre différentes activités pédagogiques et de préservation de la biodiversité, telles que :


<div class="cards columns-3">
    
<div class="card">
    <h2 id="léco-pâturage">L&rsquo;éco-pâturage</h2>
<p>L’éco-pâturage sur des espaces verts publics notamment du Parc naturel urbain et dans le cadre du futur Plan Prairie de la Ville de Strasbourg, ainsi que sur les surfaces privées de bailleurs sociaux, d’entreprises et de particuliers</p>
</div> 

<div class="card">
    <h2 id="des-animations-pédagogiques">Des animations pédagogiques</h2>
<ul>
<li>Du pâturage itinérant au sein du PNU, c’est-à-dire des sorties et déplacements de moutons dans les espaces verts, et ceci accompagnées par des publics divers notamment des scolaires suscitant de la rencontre et de la convivialité,</li>
<li>Des ateliers thématiques, combinant observations et jeux pour sensibiliser à divers sujet écologiques (pastoralisme, agriculture, biodiversité, bien-être animal, etc.), en collaboration avec des associations comme SINE, les Cols Verts et Ethosph&rsquo;R,</li>
<li>Un temps fort festif annuel, cette année ce sera l’inauguration de la bergerie  et ensuite une transhumance urbaine accompagnée de concerts ainsi que de visites de fermes,</li>
</ul>

</div> 

<div class="card">
    <h2 id="production-agricole">Production agricole</h2>
<p>Des activités agricoles telles que la valorisation de la laine et la transformation d’autres produits issus de l’exploitation de la bergerie.</p>
</div> 

</div>

Toutes ces activités seront ouvertes à une implication bénévole. Une fois formés aux gestes de bergers, les bénévoles pourront s’engager dans la vie quotidienne de la bergerie et le soin aux animaux.-->
